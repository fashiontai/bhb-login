AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: BHB Login serverless deployment.

Parameters:
  DatabaseName:
    Type: String
    Default: bhblogin
    AllowedPattern: "^[A-Za-z][A-Za-z0-9_]{0,62}$"
    Description: PostgreSQL database name for the application.
  DatabaseUsername:
    Type: String
    Default: bhbadmin
    AllowedPattern: "^[A-Za-z][A-Za-z0-9_]{0,62}$"
    Description: PostgreSQL master username.
  DatabasePassword:
    Type: String
    NoEcho: true
    MinLength: 16
    MaxLength: 64
    AllowedPattern: "^[A-Za-z0-9]+$"
    Description: PostgreSQL master password. Use letters and numbers only.
  DatabaseMinCapacity:
    Type: Number
    Default: 0.5
    MinValue: 0.5
    MaxValue: 128
    Description: Minimum Aurora Serverless v2 capacity in ACUs.
  DatabaseMaxCapacity:
    Type: Number
    Default: 1
    MinValue: 0.5
    MaxValue: 128
    Description: Maximum Aurora Serverless v2 capacity in ACUs.
  BetterAuthSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Better Auth secret, at least 32 characters.
  BetterAuthUrl:
    Type: String
    Description: Public server URL used by Better Auth.
  CorsOrigin:
    Type: String
    Description: Public web origin allowed by CORS.
  NodeEnv:
    Type: String
    Default: production
    AllowedValues:
      - development
      - production
      - test
    Description: Runtime NODE_ENV value.
  VpcCidr:
    Type: String
    Default: 10.20.0.0/16
    Description: CIDR block for the application VPC.
  PublicSubnetCidr:
    Type: String
    Default: 10.20.0.0/24
    Description: CIDR block for the public subnet.
  PrivateSubnetACidr:
    Type: String
    Default: 10.20.10.0/24
    Description: CIDR block for the first private Lambda subnet.
  PrivateSubnetBCidr:
    Type: String
    Default: 10.20.20.0/24
    Description: CIDR block for the second private Lambda subnet.
  BastionAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: Latest Amazon Linux 2023 ARM64 AMI for the SSM bastion.
  BastionInstanceType:
    Type: String
    Default: t4g.nano
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t4g.small
    Description: EC2 instance type for the SSM bastion.

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        NODE_ENV: !Ref NodeEnv

Resources:
  AppVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref AppVpc

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      CidrBlock: !Ref PublicSubnetCidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-a"
      VpcId: !Ref AppVpc

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      CidrBlock: !Ref PrivateSubnetACidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-a"
      VpcId: !Ref AppVpc

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select
        - 1
        - !GetAZs ""
      CidrBlock: !Ref PrivateSubnetBCidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-b"
      VpcId: !Ref AppVpc

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-rt"
      VpcId: !Ref AppVpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  NatGatewayEip:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat-eip"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEip.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat"

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-rt"
      VpcId: !Ref AppVpc

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetA

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetB

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - DELETE
          - GET
          - POST
          - OPTIONS
        AllowOrigins:
          - !Ref CorsOrigin

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the BHB Login Lambda function.
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: -1
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-lambda-sg"
      VpcId: !Ref AppVpc

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the BHB Login database.
      SecurityGroupIngress:
        - FromPort: 5432
          IpProtocol: tcp
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          ToPort: 5432
        - FromPort: 5432
          IpProtocol: tcp
          SourceSecurityGroupId: !Ref BastionSecurityGroup
          ToPort: 5432
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-db-sg"
      VpcId: !Ref AppVpc

  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the private SSM database bastion.
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: -1
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-ssm-bastion-sg"
      VpcId: !Ref AppVpc

  BastionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-ssm-bastion-role"

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BastionRole

  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            VolumeSize: 8
            VolumeType: gp3
      IamInstanceProfile: !Ref BastionInstanceProfile
      ImageId: !Ref BastionAmiId
      InstanceType: !Ref BastionInstanceType
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      NetworkInterfaces:
        - AssociatePublicIpAddress: false
          DeviceIndex: 0
          GroupSet:
            - !Ref BastionSecurityGroup
          SubnetId: !Ref PrivateSubnetA
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-ssm-bastion"

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for the BHB Login database.
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-db-subnet-group"

  DatabaseCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      BackupRetentionPeriod: 1
      DatabaseName: !Ref DatabaseName
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      Engine: aurora-postgresql
      EngineVersion: "16.4"
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Ref DatabasePassword
      ServerlessV2ScalingConfiguration:
        MinCapacity: !Ref DatabaseMinCapacity
        MaxCapacity: !Ref DatabaseMaxCapacity
      StorageEncrypted: true
      VpcSecurityGroupIds:
        - !Ref DatabaseSecurityGroup

  DatabaseInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AutoMinorVersionUpgrade: true
      DBClusterIdentifier: !Ref DatabaseCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: false

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      CodeUri: apps/server/dist/
      Handler: index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
      Environment:
        Variables:
          DATABASE_URL: !Sub
            - "postgresql://${Username}:${Password}@${Host}:${Port}/${Name}"
            - Username: !Ref DatabaseUsername
              Password: !Ref DatabasePassword
              Host: !GetAtt DatabaseCluster.Endpoint.Address
              Port: !GetAtt DatabaseCluster.Endpoint.Port
              Name: !Ref DatabaseName
          BETTER_AUTH_SECRET: !Ref BetterAuthSecret
          BETTER_AUTH_URL: !Ref BetterAuthUrl
          CORS_ORIGIN: !Ref CorsOrigin
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  MigrationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-migrate"
      CodeUri: apps/server/dist/
      Handler: index.migrationHandler
      Timeout: 120
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
      Environment:
        Variables:
          DATABASE_URL: !Sub
            - "postgresql://${Username}:${Password}@${Host}:${Port}/${Name}"
            - Username: !Ref DatabaseUsername
              Password: !Ref DatabasePassword
              Host: !GetAtt DatabaseCluster.Endpoint.Address
              Port: !GetAtt DatabaseCluster.Endpoint.Port
              Name: !Ref DatabaseName
          BETTER_AUTH_SECRET: !Ref BetterAuthSecret
          BETTER_AUTH_URL: !Ref BetterAuthUrl
          CORS_ORIGIN: !Ref CorsOrigin

Outputs:
  AppVpcId:
    Description: Application VPC ID.
    Value: !Ref AppVpc
  PublicSubnetId:
    Description: Public subnet ID for NAT Gateway.
    Value: !Ref PublicSubnet
  PrivateSubnetAId:
    Description: First private subnet ID for Lambda.
    Value: !Ref PrivateSubnetA
  PrivateSubnetBId:
    Description: Second private subnet ID for Lambda.
    Value: !Ref PrivateSubnetB
  NatGatewayId:
    Description: NAT Gateway ID for private subnet outbound access.
    Value: !Ref NatGateway
  LambdaSecurityGroupId:
    Description: Lambda security group ID.
    Value: !Ref LambdaSecurityGroup
  DatabaseSecurityGroupId:
    Description: Database security group ID.
    Value: !Ref DatabaseSecurityGroup
  BastionInstanceId:
    Description: Private SSM bastion instance ID for database tunnels.
    Value: !Ref BastionInstance
  BastionSecurityGroupId:
    Description: SSM bastion security group ID.
    Value: !Ref BastionSecurityGroup
  DatabaseEndpoint:
    Description: Aurora PostgreSQL cluster endpoint address.
    Value: !GetAtt DatabaseCluster.Endpoint.Address
  DatabasePort:
    Description: Aurora PostgreSQL cluster endpoint port.
    Value: !GetAtt DatabaseCluster.Endpoint.Port
  DatabaseTunnelCommand:
    Description: Local command to open a PostgreSQL tunnel through Session Manager.
    Value: !Sub >-
      aws ssm start-session --region ${AWS::Region} --target ${BastionInstance}
      --document-name AWS-StartPortForwardingSessionToRemoteHost
      --parameters '{"host":["${DatabaseCluster.Endpoint.Address}"],"portNumber":["${DatabaseCluster.Endpoint.Port}"],"localPortNumber":["15432"]}'
  DatabaseName:
    Description: RDS PostgreSQL database name.
    Value: !Ref DatabaseName
  ApiUrl:
    Description: HTTP API URL.
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
