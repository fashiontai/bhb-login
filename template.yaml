AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: BHB Login serverless deployment.

Parameters:
  DatabaseName:
    Type: String
    Default: bhblogin
    AllowedPattern: "^[A-Za-z][A-Za-z0-9_]{0,62}$"
    Description: PostgreSQL database name for the application.
  DatabaseUsername:
    Type: String
    Default: bhbadmin
    AllowedPattern: "^[A-Za-z][A-Za-z0-9_]{0,62}$"
    Description: PostgreSQL master username.
  DatabasePassword:
    Type: String
    NoEcho: true
    MinLength: 16
    MaxLength: 64
    AllowedPattern: "^[A-Za-z0-9]+$"
    Description: PostgreSQL master password. Use letters and numbers only.
  DatabaseInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: RDS PostgreSQL instance class.
  DatabaseAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 100
    Description: RDS allocated storage in GiB.
  BetterAuthSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Better Auth secret, at least 32 characters.
  BetterAuthUrl:
    Type: String
    Description: Public server URL used by Better Auth.
  CorsOrigin:
    Type: String
    Description: Public web origin allowed by CORS.
  NodeEnv:
    Type: String
    Default: production
    AllowedValues:
      - development
      - production
      - test
    Description: Runtime NODE_ENV value.
  VpcCidr:
    Type: String
    Default: 10.20.0.0/16
    Description: CIDR block for the application VPC.
  PublicSubnetCidr:
    Type: String
    Default: 10.20.0.0/24
    Description: CIDR block for the public subnet.
  PrivateSubnetACidr:
    Type: String
    Default: 10.20.10.0/24
    Description: CIDR block for the first private Lambda subnet.
  PrivateSubnetBCidr:
    Type: String
    Default: 10.20.20.0/24
    Description: CIDR block for the second private Lambda subnet.

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        NODE_ENV: !Ref NodeEnv

Resources:
  AppVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref AppVpc

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      CidrBlock: !Ref PublicSubnetCidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-a"
      VpcId: !Ref AppVpc

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      CidrBlock: !Ref PrivateSubnetACidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-a"
      VpcId: !Ref AppVpc

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select
        - 1
        - !GetAZs ""
      CidrBlock: !Ref PrivateSubnetBCidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-b"
      VpcId: !Ref AppVpc

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-rt"
      VpcId: !Ref AppVpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  NatGatewayEip:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat-eip"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEip.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat"

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-rt"
      VpcId: !Ref AppVpc

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetA

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetB

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - DELETE
          - GET
          - POST
          - OPTIONS
        AllowOrigins:
          - !Ref CorsOrigin

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the BHB Login Lambda function.
      SecurityGroupEgress:
        - CidrIp: 0.0.0.0/0
          IpProtocol: -1
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-lambda-sg"
      VpcId: !Ref AppVpc

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the BHB Login database.
      SecurityGroupIngress:
        - FromPort: 5432
          IpProtocol: tcp
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          ToPort: 5432
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-db-sg"
      VpcId: !Ref AppVpc

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for the BHB Login database.
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-db-subnet-group"

  DatabaseInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      AllocatedStorage: !Ref DatabaseAllocatedStorage
      AutoMinorVersionUpgrade: true
      BackupRetentionPeriod: 1
      DBInstanceClass: !Ref DatabaseInstanceClass
      DBName: !Ref DatabaseName
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      Engine: postgres
      EngineVersion: "16.4"
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Ref DatabasePassword
      MultiAZ: false
      PubliclyAccessible: false
      StorageEncrypted: true
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      CodeUri: apps/server/dist/
      Handler: index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
      Environment:
        Variables:
          DATABASE_URL: !Sub
            - "postgresql://${Username}:${Password}@${Host}:${Port}/${Name}"
            - Username: !Ref DatabaseUsername
              Password: !Ref DatabasePassword
              Host: !GetAtt DatabaseInstance.Endpoint.Address
              Port: !GetAtt DatabaseInstance.Endpoint.Port
              Name: !Ref DatabaseName
          BETTER_AUTH_SECRET: !Ref BetterAuthSecret
          BETTER_AUTH_URL: !Ref BetterAuthUrl
          CORS_ORIGIN: !Ref CorsOrigin
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-web-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: WebBucketOrigin
            DomainName: !GetAtt WebBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt WebOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: WebBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebDistribution}"

Outputs:
  AppVpcId:
    Description: Application VPC ID.
    Value: !Ref AppVpc
  PublicSubnetId:
    Description: Public subnet ID for NAT Gateway.
    Value: !Ref PublicSubnet
  PrivateSubnetAId:
    Description: First private subnet ID for Lambda.
    Value: !Ref PrivateSubnetA
  PrivateSubnetBId:
    Description: Second private subnet ID for Lambda.
    Value: !Ref PrivateSubnetB
  NatGatewayId:
    Description: NAT Gateway ID for private subnet outbound access.
    Value: !Ref NatGateway
  LambdaSecurityGroupId:
    Description: Lambda security group ID.
    Value: !Ref LambdaSecurityGroup
  DatabaseSecurityGroupId:
    Description: Database security group ID.
    Value: !Ref DatabaseSecurityGroup
  DatabaseEndpoint:
    Description: RDS PostgreSQL endpoint address.
    Value: !GetAtt DatabaseInstance.Endpoint.Address
  DatabasePort:
    Description: RDS PostgreSQL endpoint port.
    Value: !GetAtt DatabaseInstance.Endpoint.Port
  DatabaseName:
    Description: RDS PostgreSQL database name.
    Value: !Ref DatabaseName
  ApiUrl:
    Description: HTTP API URL.
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
  WebBucketName:
    Description: S3 bucket for web assets.
    Value: !Ref WebBucket
  WebDistributionId:
    Description: CloudFront distribution ID.
    Value: !Ref WebDistribution
  WebUrl:
    Description: CloudFront web URL.
    Value: !Sub "https://${WebDistribution.DomainName}"
