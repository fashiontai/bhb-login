AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC role for deploying the BHB Login SAM stack.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or user name.
  GitHubRepo:
    Type: String
    Description: GitHub repository name.
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to assume this role when GitHubEnvironment is empty.
  GitHubEnvironment:
    Type: String
    Default: production
    Description: GitHub Environment allowed to assume this role. Leave empty to use branch-based trust.
  RoleName:
    Type: String
    Default: github-actions-bhb-login
    Description: IAM role name for GitHub Actions.
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ""
    Description: Existing GitHub OIDC provider ARN. Leave empty to create one.

Conditions:
  HasExistingGitHubOidcProvider: !Not
    - !Equals
      - !Ref ExistingGitHubOidcProviderArn
      - ""
  ShouldCreateGitHubOidcProvider: !Equals
    - !Ref ExistingGitHubOidcProviderArn
    - ""
  HasGitHubEnvironment: !Not
    - !Equals
      - !Ref GitHubEnvironment
      - ""

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateGitHubOidcProvider
    Properties:
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
      Url: https://token.actions.githubusercontent.com

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - HasExistingGitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
                - !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !If
                  - HasGitHubEnvironment
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironment}"
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: bhb-login-sam-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationAccess
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:UpdateStack
                Resource: "*"
              - Sid: SamArtifactBucketAccess
                Effect: Allow
                Action:
                  - s3:*
                Resource: "*"
              - Sid: ServerlessResourceAccess
                Effect: Allow
                Action:
                  - apigateway:*
                  - cloudfront:CreateCloudFrontOriginAccessIdentity
                  - cloudfront:CreateDistribution
                  - cloudfront:CreateInvalidation
                  - cloudfront:DeleteCloudFrontOriginAccessIdentity
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetCloudFrontOriginAccessIdentity
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:TagResource
                  - cloudfront:UpdateCloudFrontOriginAccessIdentity
                  - cloudfront:UpdateDistribution
                  - ec2:*
                  - lambda:*
                  - logs:*
                  - rds:*
                Resource: "*"
              - Sid: IamForSamRoles
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UpdateAssumeRolePolicy
                Resource: "*"

Outputs:
  GitHubDeployRoleArn:
    Description: Role ARN to store in GitHub secret AWS_ROLE_TO_ASSUME.
    Value: !GetAtt GitHubDeployRole.Arn
