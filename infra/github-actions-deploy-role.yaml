AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC role for deploying the BHB Login SAM stack.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or user name.
  GitHubRepo:
    Type: String
    Description: GitHub repository name.
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to assume this role when GitHubEnvironment is empty.
  GitHubEnvironment:
    Type: String
    Default: production
    Description: GitHub Environment allowed to assume this role. Leave empty to use branch-based trust.
  RoleName:
    Type: String
    Default: github-actions-bhb-login
    Description: IAM role name for GitHub Actions.
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ""
    Description: Existing GitHub OIDC provider ARN. Leave empty to create one.

Conditions:
  HasExistingGitHubOidcProvider: !Not
    - !Equals
      - !Ref ExistingGitHubOidcProviderArn
      - ""
  ShouldCreateGitHubOidcProvider: !Equals
    - !Ref ExistingGitHubOidcProviderArn
    - ""
  HasGitHubEnvironment: !Not
    - !Equals
      - !Ref GitHubEnvironment
      - ""

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateGitHubOidcProvider
    Properties:
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
      Url: https://token.actions.githubusercontent.com

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - HasExistingGitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
                - !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !If
                  - HasGitHubEnvironment
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironment}"
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: bhb-login-sam-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationAccess
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:ListStacks
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Sid: SamArtifactBucketAccess
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:DeleteObject
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                  - s3:GetBucketOwnershipControls
                  - s3:GetBucketPolicy
                  - s3:GetBucketTagging
                  - s3:GetBucketVersioning
                  - s3:GetEncryptionConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:GetObject
                  - s3:DeleteBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:ListBucket
                  - s3:PutBucketAcl
                  - s3:PutBucketOwnershipControls
                  - s3:PutBucketPolicy
                  - s3:PutBucketTagging
                  - s3:PutBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:PutLifecycleConfiguration
                  - s3:PutObject
                  - s3:PutBucketPublicAccessBlock
                  - s3:TagResource
                  - s3:UntagResource
                Resource: "*"
              - Sid: ServerlessResourceAccess
                Effect: Allow
                Action:
                  - apigateway:DELETE
                  - apigateway:GET
                  - apigateway:PATCH
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:TagResource
                  - apigateway:UntagResource
                  - ec2:AllocateAddress
                  - ec2:AssociateRouteTable
                  - ec2:AttachInternetGateway
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:CreateInternetGateway
                  - ec2:CreateNatGateway
                  - ec2:CreateRoute
                  - ec2:CreateRouteTable
                  - ec2:CreateSecurityGroup
                  - ec2:CreateSubnet
                  - ec2:CreateTags
                  - ec2:CreateVpc
                  - ec2:DeleteInternetGateway
                  - ec2:DeleteNatGateway
                  - ec2:DeleteRoute
                  - ec2:DeleteRouteTable
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteSubnet
                  - ec2:DeleteTags
                  - ec2:DeleteVpc
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeAddresses
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeNatGateways
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeRouteTables
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DetachInternetGateway
                  - ec2:DisassociateRouteTable
                  - ec2:ModifySubnetAttribute
                  - ec2:ModifyVpcAttribute
                  - ec2:ReleaseAddress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagLogGroup
                  - logs:TagResource
                  - logs:UntagResource
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetPolicy
                  - lambda:ListTags
                  - lambda:ListVersionsByFunction
                  - lambda:PublishVersion
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - rds:AddTagsToResource
                  - rds:CreateDBCluster
                  - rds:CreateDBClusterSnapshot
                  - rds:CreateDBInstance
                  - rds:CreateDBSnapshot
                  - rds:CreateDBSubnetGroup
                  - rds:DeleteDBCluster
                  - rds:DeleteDBClusterSnapshot
                  - rds:DeleteDBInstance
                  - rds:DeleteDBSnapshot
                  - rds:DeleteDBSubnetGroup
                  - rds:DescribeDBClusters
                  - rds:DescribeDBClusterSnapshots
                  - rds:DescribeDBInstances
                  - rds:DescribeDBSnapshots
                  - rds:DescribeDBSubnetGroups
                  - rds:ListTagsForResource
                  - rds:ModifyDBCluster
                  - rds:ModifyDBInstance
                  - rds:ModifyDBSubnetGroup
                  - rds:RemoveTagsFromResource
                Resource: "*"
              - Sid: IamForSamRoles
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:CreateRole
                  - iam:CreateServiceLinkedRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                Resource: "*"

Outputs:
  GitHubDeployRoleArn:
    Description: Role ARN to store in GitHub secret AWS_ROLE_TO_ASSUME.
    Value: !GetAtt GitHubDeployRole.Arn
