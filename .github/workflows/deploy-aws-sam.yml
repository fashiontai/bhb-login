name: Deploy AWS SAM

# Required GitHub environment secrets:
# - AWS_ROLE_TO_ASSUME
# - DATABASE_PASSWORD
# - BETTER_AUTH_SECRET
# - CLOUDFLARE_ACCOUNT_ID
# - CLOUDFLARE_API_TOKEN
#
# Optional GitHub environment variables:
# - DATABASE_NAME
# - DATABASE_USERNAME
# - DATABASE_INSTANCE_CLASS
# - DATABASE_ALLOCATED_STORAGE
# - CLOUDFLARE_PAGES_PROJECT
# - CORS_ORIGIN

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS Region
        required: false
        default: ap-northeast-1
      stack_name:
        description: CloudFormation stack name
        required: false
        default: bhb-login

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-northeast-1' }}
  STACK_NAME: ${{ inputs.stack_name || vars.SAM_STACK_NAME || 'bhb-login' }}
  NODE_VERSION: "22"
  PNPM_VERSION: "11.10.0"

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v3

      - name: Validate deployment parameters
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          for name in AWS_ROLE_TO_ASSUME DATABASE_PASSWORD BETTER_AUTH_SECRET CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: ${name}"
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: bhb-login-sam-deploy

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://bhbadmin:${{ secrets.DATABASE_PASSWORD }}@localhost:5432/bhblogin
        run: pnpm install --frozen-lockfile

      - name: Check code
        env:
          DATABASE_URL: postgresql://bhbadmin:${{ secrets.DATABASE_PASSWORD }}@localhost:5432/bhblogin
          VITE_SERVER_URL: http://localhost:3000
        run: pnpm run check

      - name: Check types
        env:
          DATABASE_URL: postgresql://bhbadmin:${{ secrets.DATABASE_PASSWORD }}@localhost:5432/bhblogin
          VITE_SERVER_URL: http://localhost:3000
        run: pnpm run check-types

      - name: Build server
        env:
          DATABASE_URL: postgresql://bhbadmin:${{ secrets.DATABASE_PASSWORD }}@localhost:5432/bhblogin
        run: pnpm --filter server build

      - name: Validate SAM template
        run: sam validate --template template.yaml

      - name: Build SAM application
        run: sam build --template-file template.yaml

      - name: Deploy SAM stack
        env:
          DATABASE_NAME: ${{ vars.DATABASE_NAME || 'bhblogin' }}
          DATABASE_USERNAME: ${{ vars.DATABASE_USERNAME || 'bhbadmin' }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_INSTANCE_CLASS: ${{ vars.DATABASE_INSTANCE_CLASS || 'db.t4g.micro' }}
          DATABASE_ALLOCATED_STORAGE: ${{ vars.DATABASE_ALLOCATED_STORAGE || '20' }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'bhb-login' }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
        run: |
          set -euo pipefail
          cors_origin="${CORS_ORIGIN:-https://${CLOUDFLARE_PAGES_PROJECT}.pages.dev}"

          parameter_overrides=(
            "DatabaseName=${DATABASE_NAME}"
            "DatabaseUsername=${DATABASE_USERNAME}"
            "DatabasePassword=${DATABASE_PASSWORD}"
            "DatabaseInstanceClass=${DATABASE_INSTANCE_CLASS}"
            "DatabaseAllocatedStorage=${DATABASE_ALLOCATED_STORAGE}"
            "BetterAuthSecret=${BETTER_AUTH_SECRET}"
            "CorsOrigin=${cors_origin}"
            "NodeEnv=production"
          )

          sam deploy \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${parameter_overrides[@]}"

      - name: Read deployment outputs
        id: stack_outputs
        run: |
          set -euo pipefail
          api_url="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)"
          echo "api_url=${api_url}" >> "${GITHUB_OUTPUT}"

      - name: Build web
        env:
          VITE_SERVER_URL: ${{ steps.stack_outputs.outputs.api_url }}
        run: pnpm --filter web build

      - name: Deploy web to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'bhb-login' }}
        run: |
          set -euo pipefail
          pnpm dlx wrangler@latest pages deploy apps/web/dist \
            --project-name="${CLOUDFLARE_PAGES_PROJECT}" \
            --branch="${GITHUB_REF_NAME}"

      - name: Print deployment outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs" \
            --output table
