name: Deploy AWS Backend

# Required GitHub environment secrets:
# - AWS_ROLE_TO_ASSUME
# - DATABASE_PASSWORD
# - BETTER_AUTH_SECRET
#
# Optional GitHub environment variables:
# - DATABASE_NAME
# - DATABASE_USERNAME
# - DATABASE_MIN_CAPACITY
# - DATABASE_MAX_CAPACITY
# - FRONTEND_ORIGIN

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-aws-sam.yml"
      - "apps/server/**"
      - "infra/**"
      - "packages/api/**"
      - "packages/auth/**"
      - "packages/config/**"
      - "packages/db/**"
      - "packages/env/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "template.yaml"
      - "turbo.json"
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS Region
        required: false
        default: ap-northeast-1
      stack_name:
        description: CloudFormation stack name
        required: false
        default: bhb-login

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-northeast-1' }}
  STACK_NAME: ${{ inputs.stack_name || vars.SAM_STACK_NAME || 'bhb-login' }}
  NODE_VERSION: "22"
  PNPM_VERSION: "11.10.0"

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v3

      - name: Validate deployment parameters
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
        run: |
          set -euo pipefail
          for name in AWS_ROLE_TO_ASSUME DATABASE_PASSWORD BETTER_AUTH_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: ${name}"
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: bhb-login-sam-deploy

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://bhbadmin:${{ secrets.DATABASE_PASSWORD }}@localhost:5432/bhblogin
        run: pnpm install --frozen-lockfile

      - name: Check code
        env:
          DATABASE_URL: postgresql://bhbadmin:${{ secrets.DATABASE_PASSWORD }}@localhost:5432/bhblogin
          VITE_SERVER_URL: http://localhost:3000
        run: pnpm run check

      - name: Check types
        env:
          DATABASE_URL: postgresql://bhbadmin:${{ secrets.DATABASE_PASSWORD }}@localhost:5432/bhblogin
        run: pnpm --filter server check-types

      - name: Build server
        env:
          DATABASE_URL: postgresql://bhbadmin:${{ secrets.DATABASE_PASSWORD }}@localhost:5432/bhblogin
        run: pnpm --filter server build

      - name: Validate SAM template
        run: sam validate --template template.yaml

      - name: Build SAM application
        run: sam build --template-file template.yaml

      - name: Deploy SAM stack
        env:
          DATABASE_NAME: ${{ vars.DATABASE_NAME || 'bhblogin' }}
          DATABASE_USERNAME: ${{ vars.DATABASE_USERNAME || 'bhbadmin' }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_MIN_CAPACITY: ${{ vars.DATABASE_MIN_CAPACITY || '0.5' }}
          DATABASE_MAX_CAPACITY: ${{ vars.DATABASE_MAX_CAPACITY || '1' }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || 'https://fashiontai.online' }}
        run: |
          set -euo pipefail
          cors_origin="${FRONTEND_ORIGIN}"
          better_auth_url="${cors_origin}"

          parameter_overrides=(
            "DatabaseName=${DATABASE_NAME}"
            "DatabaseUsername=${DATABASE_USERNAME}"
            "DatabasePassword=${DATABASE_PASSWORD}"
            "DatabaseMinCapacity=${DATABASE_MIN_CAPACITY}"
            "DatabaseMaxCapacity=${DATABASE_MAX_CAPACITY}"
            "BetterAuthSecret=${BETTER_AUTH_SECRET}"
            "BetterAuthUrl=${better_auth_url}"
            "CorsOrigin=${cors_origin}"
            "NodeEnv=production"
          )

          sam deploy \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${parameter_overrides[@]}"

      - name: Read deployment outputs
        id: stack_outputs
        run: |
          set -euo pipefail
          api_url="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)"
          echo "api_url=${api_url}" >> "${GITHUB_OUTPUT}"

      - name: Update API runtime URL
        env:
          DATABASE_NAME: ${{ vars.DATABASE_NAME || 'bhblogin' }}
          DATABASE_USERNAME: ${{ vars.DATABASE_USERNAME || 'bhbadmin' }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_MIN_CAPACITY: ${{ vars.DATABASE_MIN_CAPACITY || '0.5' }}
          DATABASE_MAX_CAPACITY: ${{ vars.DATABASE_MAX_CAPACITY || '1' }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          API_URL: ${{ steps.stack_outputs.outputs.api_url }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || 'https://fashiontai.online' }}
        run: |
          set -euo pipefail
          cors_origin="${FRONTEND_ORIGIN}"

          parameter_overrides=(
            "DatabaseName=${DATABASE_NAME}"
            "DatabaseUsername=${DATABASE_USERNAME}"
            "DatabasePassword=${DATABASE_PASSWORD}"
            "DatabaseMinCapacity=${DATABASE_MIN_CAPACITY}"
            "DatabaseMaxCapacity=${DATABASE_MAX_CAPACITY}"
            "BetterAuthSecret=${BETTER_AUTH_SECRET}"
            "BetterAuthUrl=${API_URL}"
            "CorsOrigin=${cors_origin}"
            "NodeEnv=production"
          )

          sam deploy \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${parameter_overrides[@]}"

      - name: Run database migrations
        run: |
          set -euo pipefail
          aws lambda invoke \
            --function-name "${STACK_NAME}-migrate" \
            --payload '{}' \
            --cli-binary-format raw-in-base64-out \
            migration-response.json > migration-invoke.json

          cat migration-response.json

          node -e '
            const fs = require("node:fs");
            const invoke = JSON.parse(fs.readFileSync("migration-invoke.json", "utf8"));
            const response = JSON.parse(fs.readFileSync("migration-response.json", "utf8"));
            if (invoke.FunctionError || response.ok !== true) {
              console.error(JSON.stringify({ invoke, response }, null, 2));
              process.exit(1);
            }
          '

      - name: Print deployment outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs" \
            --output table
